    <!-- TEVEL FAVICON (The Star Logo) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><rect x='10.5' y='2' width='3' height='20' rx='1.5' fill='%2305DF9C' /><rect x='10.5' y='2' width='3' height='20' rx='1.5' transform='rotate(45 12 12)' fill='%2305DF9C' /><rect x='10.5' y='2' width='3' height='20' rx='1.5' transform='rotate(90 12 12)' fill='%2305DF9C' /><rect x='10.5' y='2' width='3' height='20' rx='1.5' transform='rotate(135 12 12)' fill='%2305DF9C' /></svg>" />

    <style>
      @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .animate-pulse-slow { animation: pulse-slow 3s infinite; }

      @keyframes bounceIn {
        0% { opacity: 0; transform: scale(0.9) translateY(10px); }
        70% { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-bounceIn { animation: bounceIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-fadeIn { animation: fadeIn 0.2s ease-out; }

      .tactical-grid {
        background: transparent;
      }
    </style>

  <body class="tactical-grid">
